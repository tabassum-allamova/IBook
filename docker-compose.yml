services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ibook
      POSTGRES_USER: ibook
      POSTGRES_PASSWORD: ibook
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Exposed on 5433 so it doesn't clash with a local Postgres on 5432.
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ibook -d ibook"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ibook:ibook@db:5432/ibook
      DEBUG: "True"
      SECRET_KEY: dev-secret-change-for-production
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      FRONTEND_URL: http://localhost:5173
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    volumes:
      # Bind source for hot reload during development.
      - ./backend:/app
      # Persist uploaded media (barber avatars, shop photos) across restarts.
      - backend_media:/app/media
    ports:
      - "8001:8000"
    command: python manage.py runserver 0.0.0.0:8000

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_BACKEND_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      # Keep the container's node_modules — the host doesn't mount over it.
      - /app/node_modules
    ports:
      - "5173:5173"

volumes:
  pgdata:
  backend_media:
